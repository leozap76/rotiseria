function agregarProducto() {
    const name = document.getElementById('prodName').value;
    const price = parseInt(document.getElementById('prodPrice').value);
    const cat = document.getElementById('prodCat').value;
    const img = document.getElementById('prodImg').value;
    const desc = document.getElementById('prodDesc').value;
    const opcionesStr = document.getElementById('prodOpciones').value ? document.getElementById('prodOpciones').value.trim() : "";

    // 1. Validación con alerta de Error
    if (!name || isNaN(price) || !cat) {
        Swal.fire({
            title: '¡Ups!',
            text: 'Completa Nombre, Precio y Categoría para continuar.',
            icon: 'warning',
            background: '#1a1a1a',
            color: '#fff',
            confirmButtonColor: '#ff6b00',
            confirmButtonText: 'Entendido'
        });
        return;
    }

    try {
        // Lógica para separar y guardar las opciones
        let opcionesArray = [];
        if (opcionesStr) {
            opcionesArray = opcionesStr.split(',').map(op => {
                const partes = op.split(':');
                if (partes.length === 2) {
                    return { nombre: partes[0].trim(), precio: parseInt(partes[1].trim()) };
                }
                return null;
            }).filter(op => op !== null && !isNaN(op.precio));
        }

        // Verificamos si estamos EDITANDO o CREANDO uno nuevo
        if (typeof editandoId !== 'undefined' && editandoId !== null) {
            // ---- MODO EDICIÓN ----
            const index = listaProductos.findIndex(p => p.id === editandoId);
            if (index !== -1) {
                listaProductos[index].nombre = name;
                listaProductos[index].precio = price;
                listaProductos[index].categoria = cat;
                listaProductos[index].img = img || "img/default.webp";
                listaProductos[index].desc = desc;
                listaProductos[index].opciones = opcionesArray.length > 0 ? opcionesArray : null;
            }

            // Restaurar estado del botón
            const btnSave = document.getElementById('btn-save-prod');
            if (btnSave) {
                btnSave.innerText = "GUARDAR PLATO";
                btnSave.style.backgroundColor = "#ff6b00";
            }
            editandoId = null; // Reseteamos la variable de edición

            // Alerta de Edición exitosa
            Swal.fire({
                title: '¡Actualizado!',
                text: `"${name}" se modificó correctamente.`,
                icon: 'success',
                iconColor: '#2563eb',
                background: '#1a1a1a',
                color: '#fff',
                showConfirmButton: false,
                timer: 1500
            });

        } else {
            // ---- MODO CREACIÓN (NUEVO) ----
            const nuevo = {
                id: Date.now(),
                nombre: name,
                precio: price,
                categoria: cat,
                desc: desc,
                img: img || "img/default.webp",
                opciones: opcionesArray.length > 0 ? opcionesArray : null
            };

            listaProductos.push(nuevo);

            // Alerta de Creación exitosa
            Swal.fire({
                title: '¡Plato Guardado!',
                text: `"${name}" se agregó correctamente al menú.`,
                icon: 'success',
                iconColor: '#ff6b00',
                background: '#1a1a1a',
                color: '#fff',
                showConfirmButton: false,
                timer: 1500
            });
        }

        // Guardamos los datos y refrescamos la pantalla
        saveData();

        // Limpiar inputs
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodCat').value = '🍔 Combos'; // Vuelve a la categoría por defecto
        document.getElementById('prodImg').value = '';
        document.getElementById('prodDesc').value = '';
        if(document.getElementById('prodOpciones')) document.getElementById('prodOpciones').value = '';

            background: '#1a1a1a',

}

        function descargarDataJS() {
    if(listaProductos.length === 0) return alert("Carga al menos un producto.");

    const configBase = {
        nombre: "Menu Ya", // Tu nombre de local
        telefono: "542657780645", // Tu número
        horario: {
            turno1: { apertura: "11:00", cierre: "13:00" },
            turno2: { apertura: "18:00", cierre: "01:00" }
        }
    };

    const contenido = `const TIENDA_CONFIG = ${JSON.stringify(configBase, null, 4)};\n\nconst productos = ${JSON.stringify(listaProductos, null, 4)};`;
    
    const blob = new Blob([contenido], { type: 'text/javascript' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'data.js';
    a.click();
}

function importarData(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        let contenido = e.target.result;
        try {
            const inicio = contenido.indexOf('const productos =');
            if (inicio === -1) throw new Error("No se encontró la variable productos");

            let rawData = contenido.substring(inicio);
            const startBracket = rawData.indexOf('[');
            const endBracket = rawData.lastIndexOf(']') + 1;
            let finalSelection = rawData.substring(startBracket, endBracket);

            const productosImportados = new Function(`return ${finalSelection}`)();
            
            if (Array.isArray(productosImportados)) {
                if (confirm(`¡Archivo detectado! Se encontraron ${productosImportados.length} productos. ¿Cargar al administrador?`)) {
                    listaProductos = productosImportados;
                    saveData(); // saveData ya llama a renderUI() internamente
                    
                    Swal.fire({
                        title: '¡Importación Exitosa!',
                        text: `Se han cargado ${productosImportados.length} productos correctamente.`,
                        icon: 'success',
                        background: '#1a1a1a',
                        color: '#fff',
                        confirmButtonColor: '#ff6b00'
                    });
                    return; 
                }
            }
        } catch (error) {
            console.error("Error al importar:", error);
            Swal.fire({
                title: 'Error de archivo',
                text: 'No se pudo procesar el data.js. Asegúrate de que el formato sea correcto.',
                icon: 'error',
                background: '#1a1a1a',
                color: '#fff',
                confirmButtonColor: '#ff0000'
            });
        }
    };
    reader.readAsText(file);
}

        // Variable global para saber si estamos editando
let editandoId = null;

function prepararEdicion(id) {
    const p = listaProductos.find(item => item.id === id);
    if (!p) return;

    editandoId = id;
    
    // Mapeo de datos al formulario
    document.getElementById('prodName').value = p.nombre;
    document.getElementById('prodPrice').value = p.precio;
    document.getElementById('prodCat').value = p.categoria;
    document.getElementById('prodImg').value = p.img;
    document.getElementById('prodDesc').value = p.desc || "";
    
    // Convertir opciones de array a texto para el input
    if (p.opciones) {
        document.getElementById('prodOpciones').value = p.opciones.map(o => `${o.nombre}:${o.precio}`).join(', ');
    } else {
        document.getElementById('prodOpciones').value = "";
    }

    // Feedback visual en el botón de guardado
    const btnSave = document.querySelector("button[onclick='agregarProducto()']");
    btnSave.innerText = "ACTUALIZAR CAMBIOS";
    btnSave.style.backgroundColor = "#2563eb"; // Azul para modo edición
    
    // Scroll automático al formulario para editar rápido
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelarEdicion() {
    editandoId = null;
    document.getElementById('product-form').reset();
    const btnSave = document.getElementById('btn-save-prod');
    btnSave.innerText = "GUARDAR PLATO";
    btnSave.classList.replace('bg-blue-500', 'bg-[#ff6b00]');
    document.getElementById('btn-cancel-edit').classList.add('hidden');
}
